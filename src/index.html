<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Dock</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <button class="mark" id="brandMark" type="button" title="展开侧边栏" aria-label="展开侧边栏">P</button>
          <div class="brandText">
            <h1>Prompt Dock</h1>
            <p id="shortcutLabel">快速唤起</p>
          </div>
          <button class="sidebarToggle" id="sidebarToggle" title="收缩侧边栏" aria-label="收缩侧边栏" aria-expanded="true">
            <span></span>
          </button>
        </div>

        <button class="primary" id="newPrompt">+ 新建提示词</button>

        <nav class="filters">
          <button class="filter active" data-filter="all">全部</button>
          <button class="filter" data-filter="favorite">收藏</button>
          <button class="filter" data-filter="recent">最近复制</button>
        </nav>

        <div class="tagBox">
          <div class="sectionTitle">标签</div>
          <div id="tagList" class="tags"></div>
        </div>

        <div class="storage">
          <div class="sectionTitle">仓库</div>
          <button class="currentStore" id="currentStore" type="button">
            <span>当前仓库</span>
            <small id="currentStorePath">未选择仓库</small>
          </button>
          <div class="storeHistory" id="storeHistory"></div>
        </div>
      </aside>
      <div class="columnResize sidebarResize" id="sidebarResize" title="拖拽调整侧边栏宽度"></div>

      <main class="main">
        <section class="workspace">
          <div class="listPane">
            <div class="listSearchBar">
              <div class="searchWrap">
                <span>⌕</span>
                <input id="search" type="search" placeholder="搜索标题、标签或内容" autocomplete="off" />
              </div>
            </div>
            <div class="listHeader">
              <span id="countLabel">0 条</span>
              <button class="textButton" id="clearSearch">清空搜索</button>
            </div>
            <div id="promptList" class="promptList"></div>
          </div>
          <div class="columnResize listResize" id="listResize" title="拖拽调整列表宽度"></div>

          <article class="editorPane">
            <div class="editorHeader">
              <input id="titleInput" class="titleInput" placeholder="提示词标题" />
              <button class="iconButton" id="favoriteButton" title="收藏">☆</button>
            </div>

            <input id="tagInput" class="tagInput" placeholder="标签，用逗号分隔，例如：产品, 总结" />
            <div class="contentHeader">
              <span>提示词内容</span>
              <button class="secondary" id="openTextEditor">使用编辑器</button>
            </div>
            <textarea id="contentInput" spellcheck="false" placeholder="在这里编写提示词内容"></textarea>

            <div class="actions">
              <button class="danger" id="deletePrompt">删除</button>
              <div class="rightActions">
                <span id="status"></span>
                <button class="secondary" id="duplicatePrompt">复制为新提示词</button>
                <button class="primary" id="copyPrompt">复制内容</button>
              </div>
            </div>
          </article>
        </section>
      </main>
    </div>

    <div class="editorDialog" id="editorDialog" hidden>
      <div class="editorDialogPanel" role="dialog" aria-modal="true" aria-labelledby="editorDialogTitle">
        <div class="editorDialogHeader">
          <div>
            <h2 id="editorDialogTitle">编辑器</h2>
            <p>左侧浏览版本，右侧按列编辑或查看内容。</p>
          </div>
          <button class="ghost" id="closeTextEditor">关闭</button>
        </div>

        <div class="editorDialogBody">
          <aside class="versionSidebar" id="versionSidebar">
            <div class="versionSidebarHeader">
              <div>
                <div class="versionTitle">版本</div>
                <p>点击版本可在当前列呈现。</p>
              </div>
              <button class="iconButton smallIconButton folderToggleButton" id="toggleVersionSidebar" type="button" title="收缩版本侧边栏" aria-label="收缩版本侧边栏">
                <span class="collapseArrow">‹</span>
              </button>
            </div>

            <div class="versionList" id="versionList"></div>
          </aside>

          <section class="editorWorkspace">
            <div class="editorToolbar">
              <input id="versionNameInput" class="versionNameInput" placeholder="版本名称，例如：初稿、优化版" />
              <button class="secondary" id="saveVersion">保存版本</button>
              <button class="secondary" id="addEditorColumn">插入比较列</button>
            </div>

            <div class="editorColumns" id="editorColumns"></div>
          </section>
        </div>
      </div>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
